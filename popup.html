<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      padding: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    h2 {
      margin-top: 0;
      color: #333;
      font-size: 18px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 5px;
      background: #D97757;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #C15F3C;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #browseConversations {
      background: #D97757;
      margin-top: 10px;
    }
    #browseConversations:hover {
      background: #C15F3C;
    }
    .status {
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
      font-size: 13px;
    }
    .success {
      background: #d4edda;
      color: #155724;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
    }
    .options {
      margin: 15px 0;
    }
    label {
      display: block;
      margin: 8px 0;
      font-size: 13px;
    }
    input[type="checkbox"] {
      margin-right: 5px;
    }
    select {
      width: 100%;
      padding: 5px;
      margin-top: 5px;
      border: 1px solid #ddd;
      border-radius: 3px;
    }
    input[type="text"] {
      width: 100%;
      padding: 5px;
      margin-top: 5px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 13px;
    }
    .name-row {
      display: flex;
      gap: 8px;
    }
    .name-row > label { flex: 1; margin: 8px 0; }

    /* Inline help tooltip — small circle next to a control, shows a black popover on hover/focus */
    .info-tip {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      margin-left: 4px;
      font-size: 10px;
      font-weight: 600;
      font-style: italic;
      font-family: 'Georgia', serif;
      color: #888;
      background: #e8e6e0;
      border-radius: 50%;
      cursor: help;
      user-select: none;
      line-height: 1;
      vertical-align: middle;
    }
    .info-tip:hover, .info-tip:focus {
      background: #D97757;
      color: white;
      outline: none;
    }
    .info-tip-content {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.6;
      width: 220px;
      font-weight: 400;
      font-style: normal;
      font-family: inherit;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 2000;
      white-space: normal;
      text-align: left;
    }
    .info-tip-content::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #1a1a1a;
    }
    .info-tip:hover .info-tip-content,
    .info-tip:focus .info-tip-content {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div style="margin: -8px -8px 15px -8px;">
    <img src="popup-header.png" alt="Claude Conversation Exporter" style="width: 100%; height: auto; display: block;">
  </div>
  
  <div style="padding: 0 7px;">
    <div id="setupNotice" class="status info" style="display: none;">
      ⚠️ Organization ID not configured. 
      <a href="#" id="openOptions">Click here to set it up</a>
    </div>
    
    <div class="options">
    <label>
      Export format:
      <select id="format">
        <option value="line">LINE (HTML)</option>
        <option value="markdown">Markdown</option>
        <option value="text">Plain Text</option>
        <option value="json">JSON (Raw)</option>
      </select>
    </label>

    <label>
      <input type="checkbox" id="includeMetadata" checked>
      Metadata
      <span class="info-tip" tabindex="0" role="tooltip" aria-label="Metadata 说明">i<span class="info-tip-content">在 Markdown / Plain Text 顶部加入创建时间、更新时间、模型；并在每条消息下方加发送时间戳。LINE HTML 不受此影响（时间戳与日期分割条默认显示）。JSON 总是包含原始全部字段。</span></span>
    </label>
    <label>
      <input type="checkbox" id="includeThinking">
      包含思考链
    </label>
    <label>
      <input type="checkbox" id="includeRetries">
      包含冗余消息
      <span class="info-tip" tabindex="0" role="tooltip" aria-label="冗余消息说明">i<span class="info-tip-content">相邻同发送者的多条消息（如重新生成、长输出分段、对话编辑残留）默认折叠为最后一条，让导出更干净。勾选则保留所有版本。</span></span>
    </label>

    <div class="name-row">
      <label>我:
        <input type="text" id="humanName" value="我">
      </label>
      <label>对方:
        <input type="text" id="assistantName" value="Claude">
      </label>
    </div>
  </div>

  <button id="exportCurrent">Export Current Conversation</button>
  <button id="exportAll">Export All Conversations</button>
  <button id="browseConversations">Browse All Conversations</button>
  
  <div id="status"></div>
  </div>

  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
